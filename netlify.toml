[build]
  command = "npm ci --include=dev && npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["build/**"]

[functions.api]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"

[context.production.environment]
  NODE_ENV = "production"
