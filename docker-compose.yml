services:
  postgres:
    image: postgres:16-alpine
    container_name: nodejs-3rd-challenge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: authms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
